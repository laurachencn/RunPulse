name: RunPulse
options:
  bundleIdPrefix: com.laurachencn
  deploymentTarget:
    iOS: 17.0
    watchOS: 10.0
  xcodeVersion: "16.0"
  generateEmptyDirectories: true

schemes:
  RunPulse:
    build:
      targets:
        RunPulse: all
        RunPulseTests: [test]
        RunPulseUITests: [test]
    test:
      targets:
        - RunPulseTests
        - RunPulseUITests
      gatherCoverageData: false
  RunPulseWatch:
    build:
      targets:
        RunPulseWatch: all
        RunPulseWatchTests: [test]
    test:
      targets:
        - RunPulseWatchTests
      gatherCoverageData: false

targets:
  RunPulse:
    type: application
    platform: iOS
    sources:
      - path: RunPulse
        excludes:
          - "**/RunPulseWatch/**"
    settings:
      base:
        SWIFT_VERSION: 5.9
        TARGETED_DEVICE_FAMILY: "1,2"
        INFOPLIST_FILE: RunPulse/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - sdk: UIKit.framework
      - sdk: SwiftUI.framework
      - sdk: HealthKit.framework
      - sdk: WatchConnectivity.framework
      - sdk: CoreData.framework

  RunPulseWatch:
    type: application
    platform: watchOS
    sources:
      - path: RunPulseWatch
      - path: RunPulse/Models
        buildPhase: sources
    settings:
      base:
        SWIFT_VERSION: 5.9
        INFOPLIST_FILE: RunPulseWatch/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        WATCHOS_DEPLOYMENT_TARGET: "10.0"
        PRODUCT_BUNDLE_IDENTIFIER: com.laurachencn.RunPulse.watch
    dependencies:
      - sdk: WatchKit.framework
      - sdk: SwiftUI.framework
      - sdk: HealthKit.framework
      - sdk: CoreLocation.framework

  RunPulseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RunPulseTests/HealthKitManagerTests.swift
      - RunPulseTests/WatchSessionManagerTests.swift
      - RunPulseTests/RunSessionTests.swift
      - RunPulseTests/StorageManagerTests.swift
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: RunPulse

  RunPulseWatchTests:
    type: bundle.unit-test
    platform: watchOS
    sources:
      - RunPulseTests/WorkoutManagerTests.swift
      - RunPulseTests/HeartRateMonitorTests.swift
      - RunPulseTests/PaceTrackerTests.swift
      - RunPulseTests/AlertEngineTests.swift
      - RunPulseTests/IntegrationTests.swift
      - RunPulseTests/WatchRunStateTests.swift
      - RunPulseTests/VoiceServiceTests.swift
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: RunPulseWatch

  RunPulseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: RunPulseUITests
    settings:
      base:
        SWIFT_VERSION: 5.9
        GENERATE_INFOPLIST_FILE: true
    dependencies:
      - target: RunPulse
